<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前往會員中心...</title>
    <style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #000;
        position: relative;
    }

    .image-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('BOT_TESTING.jpg'); 
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1;
        filter: brightness(90%);
    }

    /* 緩慢的呼吸動畫 */
    @keyframes breath {
        0% { opacity: 0.05; }
        50% { opacity: 0.25; } /* 最高亮度稍微調低一點，更神祕 */
        100% { opacity: 0.05; }
    }

    #random-btn {
        position: absolute;
        background: none;
        border: none;
        padding: 25px; /* 增加感應區，讓使用者比較好「撞到」它 */
        margin: 0;
        outline: none;
        font-size: 15px;
        letter-spacing: 2px;
        color: #ffffff;
        font-weight: 300;
        
        /* 這裡改成了 8 秒，你可以根據喜好改成 6s 或 10s */
        animation: breath 8s infinite ease-in-out;
        
        cursor: default; 
        z-index: 10;
        transition: all 0.8s; /* 顯現時的過渡也變慢 */
        white-space: nowrap;
    }

    #random-btn:hover {
        animation: none;
        opacity: 1 !important;
        color: #fff;
        cursor: pointer;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        transform: scale(1.05);
    }
    </style>
</head>
<body>

    <div class="image-container"></div>
    
    <!-- 改用比較像按鈕但依然低調的文字 -->
    <button id="random-btn" onclick="goToLink()">點擊跳轉</button>

    <script>
        function moveButton() {
            const btn = document.getElementById('random-btn');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;

            // 隨機位置限制（留出較寬的邊距，避免出現在死角）
            const padding = 60; 
            const maxX = windowWidth - btnWidth - padding;
            const maxY = windowHeight - btnHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function goToLink() {
            window.location.href = "https://www.swordofjustice.com/h5/20260424/vip/index.html?fbclid=IwRlRTSARb3G1leHRuA2FlbQIxMQBzcnRjBmFwcF9pZAo2NjI4NTY4Mzc5AAEeErhrdbC3ylNDOCI8LEmhOAIld-jiq2zq1-FYEqvCMK8JyaJRuMSZQpMPSxc_aem_I1-wJUTV50zS-5UqGKb8xA#/"; 
        }

        window.onload = moveButton;
    </script>
</body>
</html>
