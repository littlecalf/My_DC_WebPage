<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Hidden Key</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BOT_TESTING.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            filter: brightness(90%);
        }

        /* 呼吸燈動畫：從幾乎看不見到微弱可見 */
        @keyframes breath {
            0% { opacity: 0.1; }
            50% { opacity: 0.4; }
            100% { opacity: 0.1; }
        }

        /* 彩蛋按鈕樣式 */
        #random-btn {
            position: absolute;
            background: none;
            border: none;
            padding: 20px; /* 增加點擊區域感應 */
            margin: 0;
            outline: none;
            
            /* 文字設定 */
            font-size: 16px;
            letter-spacing: 1px;
            color: #ffffff;
            font-weight: 300;
            
            /* 套用動畫：每 3 秒循環一次 */
            animation: breath 3s infinite ease-in-out;
            
            cursor: default; 
            z-index: 10;
            transition: all 0.3s;
            white-space: nowrap;
        }

        /* 找到並滑過去時的反應 */
        #random-btn:hover {
            animation: none; /* 停止呼吸動畫 */
            opacity: 1 !important;
            color: #fffa65; /* 變成亮黃色，提示成功 */
            cursor: pointer;
            text-shadow: 0 0 8px rgba(255, 250, 101, 0.8);
        }
    </style>
</head>
<body>

    <div class="image-container"></div>
    
    <!-- 改用比較像按鈕但依然低調的文字 -->
    <button id="random-btn" onclick="goToLink()">Click</button>

    <script>
        function moveButton() {
            const btn = document.getElementById('random-btn');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;

            // 隨機位置限制（留出較寬的邊距，避免出現在死角）
            const padding = 60; 
            const maxX = windowWidth - btnWidth - padding;
            const maxY = windowHeight - btnHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function goToLink() {
            window.location.href = "https://www.google.com"; 
        }

        window.onload = moveButton;
    </script>
</body>
</html>
