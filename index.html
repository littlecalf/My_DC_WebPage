<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #f0f0f0;
        position: relative;
    }

    .image-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('BOT_TESTING.jpg'); 
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1;

        /* --- 加入這行來調整亮度 --- */
        filter: brightness(90%); 
    }

    /* 按鈕樣式維持不變 */
    #random-btn {
        position: absolute;
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        outline: none;
        font-size: 20px;
        font-weight: bold;
        color: #333; 
        cursor: pointer;
        z-index: 10;
        text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        transition: color 0.2s, transform 0.2s;
    }

    #random-btn:hover {
        color: #ff4757;
        text-decoration: underline;
        transform: scale(1.1);
    }
</style>
