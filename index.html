<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前往會員中心...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* 改為黑色背景增加氛圍 */
            position: relative;
        }

        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BOT_TESTING.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            filter: brightness(90%);
        }

        /* 隱藏版按鈕樣式 */
        #random-btn {
            position: absolute;
            background: none;
            border: none;
            padding: 15px;
            margin: 0;
            outline: none;
            
            /* 讓按鈕極度不明顯 */
            font-size: 14px; /* 縮小字體 */
            color: rgba(100, 100, 100, 0.3); /* 極淡的灰色，接近透明 */
            opacity: 0.1; /* 初始透明度極低 */
            
            /* 移除「小手」指標，讓使用者不知道這裡有東西 */
            cursor: default; 
            
            z-index: 10;
            transition: opacity 0.5s, color 0.5s;
            white-space: nowrap;
        }

        /* 當使用者「碰巧」滑過時才顯現 */
        #random-btn:hover {
            opacity: 0.8;
            color: #ffffff; /* 滑過時變白 */
            text-decoration: none;
            cursor: pointer; /* 找到後才顯示小手 */
        }
    </style>
</head>
<body>

    <div class="image-container"></div>
    
    <!-- 這裡可以改一個更不起眼的文字 -->
    <button id="random-btn" onclick="goToLink()">.</button>

    <script>
        function moveButton() {
            const btn = document.getElementById('random-btn');
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;

            const padding = 50; // 增加邊距，避免出現在死角
            const maxX = windowWidth - btnWidth - padding;
            const maxY = windowHeight - btnHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function goToLink() {
            window.location.href = "https://www.swordofjustice.com/h5/20260424/vip/index.html?fbclid=IwRlRTSARb3G1leHRuA2FlbQIxMQBzcnRjBmFwcF9pZAo2NjI4NTY4Mzc5AAEeErhrdbC3ylNDOCI8LEmhOAIld-jiq2zq1-FYEqvCMK8JyaJRuMSZQpMPSxc_aem_I1-wJUTV50zS-5UqGKb8xA#/"; 
        }

        window.onload = moveButton;
    </script>
</body>
</html>
